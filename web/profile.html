<!DOCTYPE html>
<!-- Boomtown Platform — Member Profile · Version: v1.0 · Date: 2026-07-22 · Ships in: v0.5.0
     Self-service profile, family accounts + guardian signing, upcoming events, results résumé. -->
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Your profile — Boomtown Athletics</title>
  <link rel="stylesheet" href="assets/tokens.css" />
  <link rel="stylesheet" href="assets/app.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.css" />
  <style>
    /* Page styles — design-system v1.0 tokens only; transform/opacity motion only. */
    .profile-main { max-width: 720px; margin: 0 auto; padding: 16px; }
    .section { margin: 24px 0; }
    .section h2 { font-size: 22px; margin: 0 0 12px; }
    .profile-head { display: flex; gap: 16px; align-items: center; }
    .avatar { width: 88px; height: 88px; border-radius: 50%; object-fit: cover; background: var(--surface-2, #1C1C21); display: flex; align-items: center; justify-content: center; font-size: 28px; font-weight: 700; flex: none; border: 1px solid var(--border, #26262C); }
    .avatar.small { width: 48px; height: 48px; font-size: 18px; }
    .avatar-btn { min-height: 44px; }
    .row { display: flex; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--border, #26262C); }
    .row:last-child { border-bottom: 0; }
    .row .grow { flex: 1; min-width: 0; }
    .row .meta { color: var(--text-muted, #A8A49A); font-size: 15px; }
    .chip { display: inline-block; font-size: 13px; padding: 3px 10px; border-radius: 999px; border: 1px solid var(--border, #26262C); }
    .chip.ok { color: var(--positive, #4CC38A); border-color: var(--positive, #4CC38A); }
    .chip.need { color: var(--warn, #E8B54A); border-color: var(--warn, #E8B54A); }
    .switch { position: relative; width: 52px; height: 30px; flex: none; }
    .switch input { position: absolute; opacity: 0; width: 100%; height: 100%; margin: 0; cursor: pointer; }
    .switch .track { position: absolute; inset: 0; border-radius: 999px; background: var(--surface-2, #1C1C21); border: 1px solid var(--border, #26262C); transition: background 160ms ease; }
    .switch .dot { position: absolute; top: 3px; left: 3px; width: 24px; height: 24px; border-radius: 50%; background: var(--text-muted, #A8A49A); transition: transform 160ms cubic-bezier(0.23, 1, 0.32, 1); }
    .switch input:checked + .track { background: var(--accent, #D4AF37); }
    .switch input:checked + .track + .dot { transform: translateX(22px); background: #111; }
    .switch input:focus-visible + .track { outline: 2px solid var(--accent, #D4AF37); outline-offset: 2px; }
    .btn { min-height: 44px; }
    .btn:active { transform: scale(0.97); }
    .actions { display: flex; gap: 8px; flex-wrap: wrap; }
    .modal-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,.55); display: flex; align-items: center; justify-content: center; padding: 16px; z-index: 50; opacity: 0; transition: opacity 200ms cubic-bezier(0.23, 1, 0.32, 1); }
    .modal { background: var(--surface, #141417); border: 1px solid var(--border, #26262C); border-radius: 10px; max-width: 480px; width: 100%; max-height: 90vh; overflow: auto; padding: 20px; transform: scale(0.97); opacity: 0; transition: transform 200ms cubic-bezier(0.23, 1, 0.32, 1), opacity 200ms cubic-bezier(0.23, 1, 0.32, 1); }
    .modal-backdrop.open { opacity: 1; }
    .modal-backdrop.open .modal { transform: scale(1); opacity: 1; }
    .waiver-scroll { max-height: 220px; overflow: auto; border: 1px solid var(--border, #26262C); border-radius: 8px; padding: 12px; font-size: 15px; color: var(--text-muted, #A8A49A); }
    .crop-box img { max-width: 100%; display: block; }
    .results-row { display: grid; grid-template-columns: 1fr auto auto; gap: 8px; padding: 10px 0; border-bottom: 1px solid var(--border, #26262C); font-size: 15px; align-items: center; }
    .help-foot { text-align: center; color: var(--text-muted, #A8A49A); margin: 40px 0 24px; font-size: 15px; }
    @media (prefers-reduced-motion: reduce) {
      .modal, .modal-backdrop, .switch .dot { transition: opacity 150ms ease; transform: none !important; }
    }
  </style>
</head>
<body>
  <header class="header chrome-glass">
    <a class="wordmark" href="index.html" style="text-decoration:none">Boomtown <span>Athletics</span></a>
    <div class="spacer"></div>
    <button id="themeToggle" class="btn ghost theme-toggle" aria-label="Toggle dark or light theme">◐</button>
    <button id="logoutBtn" class="btn ghost" hidden>Sign out</button>
  </header>

  <main class="profile-main" id="app" aria-live="polite">
    <div class="card"><p>Loading…</p></div>
  </main>

  <p class="help-foot">Have questions or need help? <a href="mailto:admin@boomtownvb.com">Email us</a></p>

  <input type="file" id="avatarFile" accept="image/jpeg,image/png,image/webp" hidden />
  <div id="modalRoot"></div>

  <script src="assets/config.js?v=0.5.0"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.js" defer></script>
  <script src="assets/passkey.js?v=0.5.0" defer></script>
  <script src="profile.js?v=0.5.0" defer></script>
</body>
</html>
