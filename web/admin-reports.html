<!DOCTYPE html>
<!-- Boomtown Platform — Sales & Reports · Version: v1.1 · Date: 2026-07-24 · Ships in: v0.9.1
     RECOVERY of the v0.7.0 page (ZIP never uploaded). Reads GET /api/admin/reports/sales
     (reports.js, already in the repo): revenue by month, by program, by event; CSV export.
     Uses the shared admin rail so the menu matches every other admin page. -->
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sales &amp; Reports — Boomtown Athletics</title>
  <link rel="stylesheet" href="assets/tokens.css?v=0.9.1" />
  <link rel="stylesheet" href="assets/app.css?v=0.9.1" />
  <link rel="stylesheet" href="assets/admin.css?v=0.9.1" />
  <style>
    .rp-chart svg { width: 100%; height: auto; }
    .rp-chart .bar { fill: var(--primary); opacity: .85; }
    .rp-chart .val { fill: var(--text); font-size: 12px; font-weight: 700; }
    .rp-chart .lbl { fill: var(--text-muted); font-size: 11px; }
    .rp-total { font-size: 26px; font-weight: 800; }
    .rp-total small { display: block; font-size: 12.5px; font-weight: 600; color: var(--text-muted); letter-spacing: .05em; text-transform: uppercase; }
  </style>
</head>
<body>
  <header class="header chrome-glass">
    <div class="wordmark"><a href="index.html" style="color:inherit;text-decoration:none">Boomtown <span>Athletics</span></a></div>
    <div class="spacer"></div>
    <select id="orgSwitcher" class="org-switcher" aria-label="Switch organization"></select>
    <button id="themeToggle" class="btn ghost theme-toggle" aria-label="Toggle dark or light theme">◐</button>
  </header>

  <div class="admin-layout">
  <main class="main wide admin-main" id="app" aria-live="polite">
    <div class="page-head"><h1>Sales &amp; Reports</h1><div class="spacer"></div>
      <button class="btn ghost" id="csvBtn">Download CSV</button></div>

    <div id="status" role="status" aria-live="polite"></div>

    <div class="stat-cards">
      <section class="card"><div class="rp-total" id="totAll">—<small>All-time revenue</small></div></section>
      <section class="card"><div class="rp-total" id="totMonth">—<small>This month</small></div></section>
      <section class="card"><div class="rp-total" id="totRegs">—<small>Paid registrations</small></div></section>
    </div>

    <section class="card rp-chart">
      <h2 style="font-size:16px;margin:0 0 10px">Revenue by month</h2>
      <div id="byMonth"><p class="help-text">Loading…</p></div>
    </section>

    <section class="card" style="margin-top:14px">
      <h2 style="font-size:16px;margin:0 0 8px">By program</h2>
      <table class="tbl"><thead><tr><th>Program</th><th>Events</th><th>Registrations</th><th>Revenue</th></tr></thead>
        <tbody id="byProgram"></tbody></table>
    </section>

    <section class="card" style="margin-top:14px">
      <h2 style="font-size:16px;margin:0 0 8px">By event</h2>
      <table class="tbl"><thead><tr><th>Event</th><th>Type</th><th>Date</th><th>Regs</th><th>Card</th><th>Cash</th><th>Total</th></tr></thead>
        <tbody id="byEvent"></tbody></table>
    </section>
  </main>
  </div><!-- /admin-layout -->

  <script src="assets/config.js?v=0.9.1"></script>
  <script src="assets/admin-nav.js?v=0.9.1"></script>
  <script src="assets/admin-reports.js?v=1.1"></script>
</body>
</html>
