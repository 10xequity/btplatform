<!DOCTYPE html>
<!-- Boomtown Platform — Public Member Profile · Version: v1.1 · Date: 2026-07-23 · Ships in: v0.6.0 (adds ← Home + site-wide sidebar)
     Read-only, visibility-gated profile card + results résumé. URL: member.html?contact_id=N -->
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Member — Boomtown Athletics</title>
  <link rel="stylesheet" href="assets/tokens.css" />
  <link rel="stylesheet" href="assets/app.css" />
  <style>
    .member-main { max-width: 640px; margin: 0 auto; padding: 16px; }
    .profile-head { display: flex; gap: 16px; align-items: center; }
    .avatar { width: 88px; height: 88px; border-radius: 50%; object-fit: cover; background: var(--surface-2, #1C1C21); display: flex; align-items: center; justify-content: center; font-size: 28px; font-weight: 700; flex: none; border: 1px solid var(--border, #26262C); }
    .meta { color: var(--text-muted, #A8A49A); font-size: 15px; }
    .ig-chip { display: inline-block; margin-top: 6px; font-size: 14px; padding: 4px 12px; border-radius: 999px; border: 1px solid var(--border, #26262C); text-decoration: none; }
    .results-row { display: grid; grid-template-columns: 1fr auto auto; gap: 8px; padding: 10px 0; border-bottom: 1px solid var(--border, #26262C); font-size: 15px; align-items: center; }
    .results-row:last-child { border-bottom: 0; }
    .help-foot { text-align: center; color: var(--text-muted, #A8A49A); margin: 40px 0 24px; font-size: 15px; }
  </style>
</head>
<body>
  <header class="header chrome-glass">
    <a class="wordmark" href="index.html" style="text-decoration:none">Boomtown <span>Athletics</span></a>
    <div class="spacer"></div>
    <a class="btn ghost" href="index.html" style="text-decoration:none" aria-label="Back to home">← Home</a>
    <a class="btn ghost" href="profile.html">Your profile</a>
  </header>

  <main class="member-main" id="app" aria-live="polite">
    <div class="card"><p>Loading…</p></div>
  </main>

  <p class="help-foot">Have questions or need help? <a href="mailto:admin@boomtownvb.com">Email us</a></p>

  <script src="assets/site-nav.js?v=0.6.0" defer></script>
  <script src="assets/config.js?v=0.5.0"></script>
  <script src="member.js?v=0.5.0" defer></script>
</body>
</html>
