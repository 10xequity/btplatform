# Boomtown Platform — Worker auto-deploy
# Version: v0.2.2 · Date: 2026-07-21
name: Deploy Worker

on:
  push:
    branches: [main]
    paths:
      - "worker/**"
      - "wrangler.toml"
      - ".github/workflows/deploy-worker.yml"
  workflow_dispatch:

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run scheduler test suite
        run: node worker/test/scheduler.test.mjs
      - name: Deploy boomtown-api
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
